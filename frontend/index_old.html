<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SmartkingLot</title>
  <style>
    body { font-family: monospace; background: #111; color: #eee; padding: 20px; }
    h1 { margin: 0 0 8px; }
    #meta { color: #888; font-size: 13px; margin-bottom: 20px; }
    #stats { display: flex; gap: 20px; margin-bottom: 20px; }
    .stat { background: #222; padding: 12px 20px; border-radius: 6px; }
    .stat span { display: block; font-size: 11px; color: #888; }
    .stat b { font-size: 24px; }
    #map-wrap { position: relative; width: 800px; }
    #map-wrap img { display: block; width: 100%; border-radius: 6px; }
    .box {
      position: absolute;
      border: 2px solid;
      border-radius: 3px;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: bold;
    }
    .box.occupied {
      border-color: #e24b4a;
      background: rgba(226, 75, 74, 0.15);
      color: #e24b4a;
    }
    .box span {
      background: rgba(255,255,255,0.85);
      padding: 0 2px;
      border-radius: 2px;
      line-height: 1.3;
    }
    .box.open {
      border-color: #639922;
      background: rgba(99, 153, 34, 0.15);
      color: #639922;
    }
    #error { color: #f66; }
  </style>
</head>
<body>
  <h1>SmartkingLot</h1>
  <div id="meta">loading...</div>
  <div id="stats"></div>
  <div id="map-wrap">
    <img id="feed" src="/stream" />
  </div>
  <p id="error"></p>

  <script>
    const API = '/api/state';

    async function refresh() {
      try {
        const res  = await fetch(API);
        const data = await res.json();
        if (!res.ok) { document.getElementById('error').textContent = data.error; return; }

        document.getElementById('error').textContent = '';
        document.getElementById('meta').textContent  = 'last updated: ' + data.timestamp;

        document.getElementById('stats').innerHTML = `
          <div class="stat"><span>total</span><b>${data.total}</b></div>
          <div class="stat"><span>occupied</span><b style="color:#e24b4a">${data.occupied}</b></div>
          <div class="stat"><span>open</span><b style="color:#639922">${data.open}</b></div>
          <div class="stat"><span>% occupied</span><b>${Math.round(data.occupied / data.total * 100)}%</b></div>
        `;

        document.querySelectorAll('.box').forEach(d => d.remove());

        const pctX = 100 / data.img_width;
        const pctY = 100 / data.img_height;

        data.spots.forEach(spot => {
          const box = document.createElement('div');
          box.className    = `box ${spot.occupied ? 'occupied' : 'open'}`;
          box.style.left   = ((spot.cx - spot.w / 2) * pctX) + '%';
          box.style.top    = ((spot.cy - spot.h / 2) * pctY) + '%';
          box.style.width  = (spot.w * pctX) + '%';
          box.style.height = (spot.h * pctY) + '%';
          const label = document.createElement("span");
          label.textContent = spot.id;
          box.appendChild(label);
          document.getElementById('map-wrap').appendChild(box);
        });

      } catch (e) {
        document.getElementById('error').textContent = 'could not reach API: ' + e.message;
      }
    }

    refresh();
    setInterval(refresh, 10000);
  </script>
</body>
</html>
