<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SmartkingLot</title>
  <style>
    body { font-family: monospace; background: #111; color: #eee; padding: 20px; }
    h1 { margin: 0 0 8px; }
    h2 { font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin: 30px 0 10px; }
    #meta { color: #888; font-size: 13px; margin-bottom: 20px; }
    #stats { display: flex; gap: 20px; margin-bottom: 20px; }
    .stat { background: #222; padding: 12px 20px; border-radius: 6px; }
    .stat span { display: block; font-size: 11px; color: #888; }
    .stat b { font-size: 24px; }

    #map-wrap, #heatmap-wrap { position: relative; width: 800px; }
    #map-wrap img, #heatmap-wrap img { display: block; width: 100%; border-radius: 6px; }

    .box {
      position: absolute;
      border: 2px solid;
      border-radius: 3px;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: bold;
      transition: outline 0.1s, transform 0.1s;
    }
    .box.occupied { border-color: #e24b4a; background: rgba(226, 75, 74, 0.15); color: #e24b4a; }
    .box.open     { border-color: #639922; background: rgba(99, 153, 34, 0.15); color: #639922; }
    .box span { background: rgba(255,255,255,0.85); padding: 0 2px; border-radius: 2px; line-height: 1.3; }

    .heat {
      position: absolute;
      border: 1px solid rgba(0,0,0,0.4);
      border-radius: 3px;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      color: #fff;
      text-shadow: 0 0 3px rgba(0,0,0,0.9);
      font-weight: bold;
      transition: outline 0.1s, transform 0.1s;
    }

    /* highlight any element matching the hovered spot id */
    .highlight {
      outline: 3px solid #fff;
      outline-offset: 1px;
      z-index: 10;
      transform: scale(1.05);
    }

    .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 800px; }
    .panel { background: #1a1a1a; border-radius: 6px; padding: 16px; }
    .panel h3 { font-size: 12px; color: #888; text-transform: uppercase; margin: 0 0 12px; }
    .panel ol { margin: 0; padding-left: 20px; font-size: 13px; line-height: 1.8; }
    .panel ol li { color: #ccc; cursor: pointer; padding: 0 4px; border-radius: 3px; }
    .panel ol li:hover, .panel ol li.highlight { background: #333; outline: none; transform: none; }
    .panel ol li b { color: #fff; }
    .panel .pct { color: #888; margin-left: 8px; }

    .scrollbox { max-height: 300px; overflow-y: auto; }
    .scrollbox::-webkit-scrollbar { width: 8px; }
    .scrollbox::-webkit-scrollbar-track { background: #1a1a1a; }
    .scrollbox::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }

    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    thead { position: sticky; top: 0; background: #1a1a1a; }
    th, td { text-align: left; padding: 4px 8px; }
    th { color: #888; font-weight: normal; border-bottom: 1px solid #333; }
    td { color: #ccc; }
    tbody tr { cursor: pointer; }
    tbody tr:hover, tbody tr.highlight { background: #333; outline: none; transform: none; }

    #error { color: #f66; }
  </style>
</head>
<body>
  <h1>SmartkingLot</h1>
  <div id="meta">loading...</div>
  <div id="stats"></div>

  <h2>live</h2>
  <div id="map-wrap">
    <img id="feed" src="/stream" />
  </div>

  <h2>heatmap (occupancy %)</h2>
  <div id="heatmap-wrap">
    <img src="/stream" />
  </div>

  <h2>spot statistics</h2>
  <div class="panels">
    <div class="panel">
      <h3>most occupied</h3>
      <ol id="most-occupied"></ol>
    </div>
    <div class="panel">
      <h3>least occupied</h3>
      <ol id="least-occupied"></ol>
    </div>
    <div class="panel">
      <h3>highest turnover</h3>
      <ol id="turnover"></ol>
    </div>
    <div class="panel">
      <h3>per-spot detail</h3>
      <div class="scrollbox">
        <table id="detail-table">
          <thead><tr><th>id</th><th>obs</th><th>occupied</th><th>turnover</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <p id="error"></p>

  <script>
    function heatColor(pct) {
      const r = Math.round(pct < 50 ? 99 + (255-99) * (pct/50) : 255);
      const g = Math.round(pct < 50 ? 153 + (255-153) * (pct/50) : 255 - (255-75) * ((pct-50)/50));
      const b = Math.round(pct < 50 ? 34 + (0-34) * (pct/50) : 75 - 75 * ((pct-50)/50));
      return `rgba(${r},${g},${b},0.65)`;
    }

    // hover highlight — toggles .highlight class on every element with the same data-spot-id
    function setupHoverHighlight() {
      document.querySelectorAll('[data-spot-id]').forEach(el => {
        el.addEventListener('mouseenter', () => {
          const id = el.dataset.spotId;
          document.querySelectorAll(`[data-spot-id="${id}"]`).forEach(m => m.classList.add('highlight'));
        });
        el.addEventListener('mouseleave', () => {
          const id = el.dataset.spotId;
          document.querySelectorAll(`[data-spot-id="${id}"]`).forEach(m => m.classList.remove('highlight'));
        });
      });
    }

    async function refresh() {
      try {
        const stateRes = await fetch('/api/state');
        const state    = await stateRes.json();
        if (!stateRes.ok) { document.getElementById('error').textContent = state.error; return; }

        document.getElementById('error').textContent = '';
        document.getElementById('meta').textContent  = 'last updated: ' + state.timestamp;

        document.getElementById('stats').innerHTML = `
          <div class="stat"><span>total</span><b>${state.total}</b></div>
          <div class="stat"><span>occupied</span><b style="color:#e24b4a">${state.occupied}</b></div>
          <div class="stat"><span>open</span><b style="color:#639922">${state.open}</b></div>
          <div class="stat"><span>% occupied</span><b>${Math.round(state.occupied / state.total * 100)}%</b></div>
        `;

        document.querySelectorAll('.box, .heat').forEach(d => d.remove());
        const pctX = 100 / state.img_width;
        const pctY = 100 / state.img_height;

        // live boxes
        state.spots.forEach(spot => {
          const box = document.createElement('div');
          box.className     = `box ${spot.occupied ? 'occupied' : 'open'}`;
          box.dataset.spotId = spot.id;
          box.style.left    = ((spot.cx - spot.w / 2) * pctX) + '%';
          box.style.top     = ((spot.cy - spot.h / 2) * pctY) + '%';
          box.style.width   = (spot.w * pctX) + '%';
          box.style.height  = (spot.h * pctY) + '%';
          const label = document.createElement('span');
          label.textContent = spot.id;
          box.appendChild(label);
          document.getElementById('map-wrap').appendChild(box);
        });

        const spotsRes = await fetch('/api/spots');
        const spots    = await spotsRes.json();

        // heatmap boxes
        spots.forEach(s => {
          const heat = document.createElement('div');
          heat.className     = 'heat';
          heat.dataset.spotId = s.id;
          heat.style.left    = ((s.cx - s.w / 2) * pctX) + '%';
          heat.style.top     = ((s.cy - s.h / 2) * pctY) + '%';
          heat.style.width   = (s.w * pctX) + '%';
          heat.style.height  = (s.h * pctY) + '%';
          heat.style.background = heatColor(s.occupied_pct);
          heat.textContent   = Math.round(s.occupied_pct) + '%';
          document.getElementById('heatmap-wrap').appendChild(heat);
        });

        const liItem = s => `<li data-spot-id="${s.id}">spot <b>${s.id}</b><span class="pct">${s.occupied_pct.toFixed(1)}% (${s.occupied_count}/${s.observations})</span></li>`;
        const liTurn = s => `<li data-spot-id="${s.id}">spot <b>${s.id}</b><span class="pct">${s.turnover} changes</span></li>`;

        document.getElementById('most-occupied').innerHTML =
          [...spots].sort((a,b) => b.occupied_pct - a.occupied_pct).slice(0, 5).map(liItem).join('');
        document.getElementById('least-occupied').innerHTML =
          [...spots].sort((a,b) => a.occupied_pct - b.occupied_pct).slice(0, 5).map(liItem).join('');
        document.getElementById('turnover').innerHTML =
          [...spots].sort((a,b) => b.turnover - a.turnover).slice(0, 5).map(liTurn).join('');

        document.querySelector('#detail-table tbody').innerHTML =
          [...spots].sort((a,b) => a.id - b.id).map(s => `
            <tr data-spot-id="${s.id}">
              <td>${s.id}</td>
              <td>${s.observations}</td>
              <td>${s.occupied_count} (${s.occupied_pct.toFixed(0)}%)</td>
              <td>${s.turnover}</td>
            </tr>`).join('');

        setupHoverHighlight();

      } catch (e) {
        document.getElementById('error').textContent = 'could not reach API: ' + e.message;
      }
    }

    refresh();
    setInterval(refresh, 10000);
  </script>
</body>
</html>
